services:

  mysql:
    image: mysql:5.7
    container_name: railway-ticketing-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./mysql/conf/my.cnf:/etc/mysql/my.cnf
      - ./mysql/data:/var/lib/mysql
    command:
      --default-authentication-plugin=mysql_native_password